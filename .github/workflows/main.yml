name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: flaviapaiva234
          outputs: |
            dist/github-contribution-grid-snake.gif?color_snake=%23EC4899&color_dots=%23DBEAFE,%2393C5FD,%2360A5FA,%233B82F6,%231E3A8A&color_background=%23FFFFFF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
